name: "系统状态监控"
version: "1.0.6"
slug: "system_status_monitor"
description: "实时监控 Home Assistant 系统健康状态的 Web 仪表盘"
arch:
  - armv7
  - aarch64
  - amd64
  - i386
ingress: true
ingress_port: 8099
panel_icon: mdi:heart-pulse
panel_title: 系统状态
panel_admin: false
host_network: true
hassio_api: true
homeassistant_api: true
init: false
options:
  refresh_interval: 30
  port: 8099
schema:
  refresh_interval: int(5,300)
  port: int(1024,65535)
